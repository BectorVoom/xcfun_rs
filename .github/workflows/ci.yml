name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""           # CLAUDE.md: empty in CI — no fast-math / reassociation
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy -D warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clone xcfun-master at pinned HEAD (a89b783)
        run: |
          # `git fetch origin <abbrev-sha>` treats the SHA as a ref name and
          # fails ("couldn't find remote ref"); fetch recent history instead and
          # check out the full 40-char SHA (mirrors validate-order3-sweep.yml).
          git clone --depth=200 https://github.com/dftlibs/xcfun.git xcfun-master
          git -C xcfun-master checkout a89b783497d4fe146b477ac7a053303ce4189e9a
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  build:
    name: cargo build --workspace --release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Clone xcfun-master at pinned HEAD (a89b783)
        run: |
          # `git fetch origin <abbrev-sha>` treats the SHA as a ref name and
          # fails ("couldn't find remote ref"); fetch recent history instead and
          # check out the full 40-char SHA (mirrors validate-order3-sweep.yml).
          git clone --depth=200 https://github.com/dftlibs/xcfun.git xcfun-master
          git -C xcfun-master checkout a89b783497d4fe146b477ac7a053303ce4189e9a
      - run: cargo build --workspace --locked --release

  test:
    name: cargo nextest run --workspace
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Clone xcfun-master at pinned HEAD (a89b783)
        run: |
          # `git fetch origin <abbrev-sha>` treats the SHA as a ref name and
          # fails ("couldn't find remote ref"); fetch recent history instead and
          # check out the full 40-char SHA (mirrors validate-order3-sweep.yml).
          git clone --depth=200 https://github.com/dftlibs/xcfun.git xcfun-master
          git -C xcfun-master checkout a89b783497d4fe146b477ac7a053303ce4189e9a
      - run: cargo nextest run --workspace --locked --release --no-fail-fast

  mpmath-smoke:
    # Validates Plan 06-N5: mpmath sidecar regen for the smoke set
    # (5 functionals × 5 records → target/mpmath_smoke/) at python3.12
    # via the XCFUN_MPMATH_PYTHON env-var override.
    name: mpmath fixture smoke regen
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mpmath
        run: python3.12 -m pip install --upgrade "mpmath>=1.4"
      - name: Smoke regen
        env:
          XCFUN_MPMATH_PYTHON: python3.12
        run: cargo run --release -p xtask --bin regen-mpmath-fixtures -- --smoke
      - name: Verify smoke output
        run: |
          set -euo pipefail
          for f in brx tw pbelocc blocx scanx; do
            test -s "target/mpmath_smoke/${f}.jsonl" \
              || { echo "missing or empty: target/mpmath_smoke/${f}.jsonl"; exit 1; }
            lines=$(wc -l < "target/mpmath_smoke/${f}.jsonl")
            test "$lines" -eq 5 \
              || { echo "${f}: expected 5 records, got $lines"; exit 1; }
          done
      - name: Single-record invocation for ACC-04 functionals
        run: |
          set -euo pipefail
          for fn in ldaerfx ldaerfc ldaerfc_jt; do
            python3.12 -m xtask.mpmath_eval \
              --functional "$fn" --vars A_B \
              --mode partial_derivatives --order 0 \
              --input "0.5,0.5" --prec 200 \
              | python3.12 -c "import sys, json; d=json.loads(sys.stdin.read()); assert len(d['output']) == 1, d; print('OK', d['output'][0])"
          done
          for fn in tpssc tpsslocc revtpssc; do
            python3.12 -m xtask.mpmath_eval \
              --functional "$fn" \
              --vars A_B_GAA_GAB_GBB_LAPA_LAPB_TAUA_TAUB \
              --mode partial_derivatives --order 0 \
              --input "0.5,0.5,0.1,0.05,0.1,0.0,0.0,0.3,0.3" --prec 200 \
              | python3.12 -c "import sys, json; d=json.loads(sys.stdin.read()); assert len(d['output']) == 1, d; print('OK', d['output'][0])"
          done
