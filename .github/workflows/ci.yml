name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""           # CLAUDE.md: empty in CI — no fast-math / reassociation
  RUST_BACKTRACE: 1

jobs:
  fmt:
    # Advisory only (continue-on-error) — pre-existing fmt drift across
    # crates/xcfun-ad/src/ exists at the time this workflow was authored.
    # Surfacing is the point; will be cleaned up in a follow-up.
    name: cargo fmt --check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    # Advisory only (continue-on-error). Pre-existing unused-import /
    # dead-code warnings in crates/xcfun-kernels/src/functionals/{lda,mgga,gga}/
    # exist at the time this workflow was authored — they're surfaced as
    # informational; cleanup is a follow-up task.
    name: cargo clippy -D warnings (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude validation --all-targets -- -D warnings

  build:
    name: cargo build --workspace --release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      # Without --locked: lockfile MSRV-1.85 contract is broken by current
      # transitive deps (cubecl-zspace 0.10.0-pre.3 → rustc 1.92, etc.) —
      # tracked as separate cleanup. Stable toolchain handles current lockfile.
      # Exclude `validation` — its build.rs depends on the `xcfun-master/`
      # C++ upstream tree, which is .gitignore'd (operator restores it
      # locally per CLAUDE.md "xcfun-master restored at HEAD a89b783").
      # validation is app-boundary tooling, not part of the library graph.
      - run: cargo build --workspace --exclude validation --release

  test:
    name: cargo nextest run --workspace
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --exclude validation --release --no-fail-fast

  mpmath-smoke:
    # Validates Plan 06-N5: mpmath sidecar regen for the smoke set
    # (5 functionals × 5 records → target/mpmath_smoke/) at python3.12
    # via the XCFUN_MPMATH_PYTHON env-var override.
    name: mpmath fixture smoke regen
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mpmath
        run: python3.12 -m pip install --upgrade "mpmath>=1.4"
      - name: Smoke regen
        env:
          XCFUN_MPMATH_PYTHON: python3.12
        run: cargo run --release -p xtask --bin regen-mpmath-fixtures -- --smoke
      - name: Verify smoke output
        run: |
          set -euo pipefail
          for f in brx tw pbelocc blocx scanx; do
            test -s "target/mpmath_smoke/${f}.jsonl" \
              || { echo "missing or empty: target/mpmath_smoke/${f}.jsonl"; exit 1; }
            lines=$(wc -l < "target/mpmath_smoke/${f}.jsonl")
            test "$lines" -eq 5 \
              || { echo "${f}: expected 5 records, got $lines"; exit 1; }
          done
      - name: Single-record invocation for ACC-04 functionals
        run: |
          set -euo pipefail
          for fn in ldaerfx ldaerfc ldaerfc_jt; do
            python3.12 -m xtask.mpmath_eval \
              --functional "$fn" --vars A_B \
              --mode partial_derivatives --order 0 \
              --input "0.5,0.5" --prec 200 \
              | python3.12 -c "import sys, json; d=json.loads(sys.stdin.read()); assert len(d['output']) == 1, d; print('OK', d['output'][0])"
          done
          for fn in tpssc tpsslocc revtpssc; do
            python3.12 -m xtask.mpmath_eval \
              --functional "$fn" \
              --vars A_B_GAA_GAB_GBB_LAPA_LAPB_TAUA_TAUB \
              --mode partial_derivatives --order 0 \
              --input "0.5,0.5,0.1,0.05,0.1,0.0,0.0,0.3,0.3" --prec 200 \
              | python3.12 -c "import sys, json; d=json.loads(sys.stdin.read()); assert len(d['output']) == 1, d; print('OK', d['output'][0])"
          done
