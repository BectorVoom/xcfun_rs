# cbindgen.toml — config for `cargo run -p xtask --bin regen-capi-header`.
# Phase 5 D-09 + D-11 + D-12.

language     = "C"
include_guard = "XCFUN_CAPI_H"
documentation = false
documentation_style = "doxy"   # ignored when documentation=false
cpp_compat   = true
style        = "type"
no_includes  = false
sys_includes = ["stdbool.h", "stddef.h"]
include_version = false

header = """/*
 * Auto-generated by cbindgen 0.29.2 from crates/xcfun-capi/src/.
 * Phase 5 — drop-in replacement for xcfun-master/api/xcfun.h.
 * DO NOT EDIT by hand. Regenerate via:
 *   cargo run -p xtask --bin regen-capi-header
 * Drift check (CI gate):
 *   cargo run -p xtask --bin regen-capi-header -- --check
 */"""

# D-12 (prelude): inline the XCFun_API macro so the generated header is
# standalone — consumers do NOT need the cmake-generated companion
# XCFun/XCFunExport.h header. Also inline the upstream `xcfun_mode` and
# `xcfun_vars` enums + the `xcfun_s`/`xcfun_t` typedef so a downstream
# `#include <xcfun.h>` compiles drop-in. The Rust FFI signatures take
# raw `c_int` for vars/mode, so cbindgen does not auto-emit these enums;
# emitting them in the prelude keeps drop-in source compatibility with
# code that uses the `XC_*` enumerator constants.
after_includes = """
#define XCFUN_API_VERSION 2

#ifndef XCFun_API
# if defined(_WIN32) || defined(__CYGWIN__)
#   ifdef XCFUN_BUILD_SHARED
#     define XCFun_API __declspec(dllexport)
#   else
#     define XCFun_API __declspec(dllimport)
#   endif
# else
#   define XCFun_API __attribute__((visibility(\"default\")))
# endif
#endif

#ifndef XCFUN_MAX_ORDER
#define XCFUN_MAX_ORDER 6
#endif

typedef enum {
  XC_MODE_UNSET = 0,
  XC_PARTIAL_DERIVATIVES,
  XC_POTENTIAL,
  XC_CONTRACTED,
  XC_NR_MODES
} xcfun_mode;

typedef enum {
  XC_VARS_UNSET = -1,
  XC_A,
  XC_N,
  XC_A_B,
  XC_N_S,
  XC_A_GAA,
  XC_N_GNN,
  XC_A_B_GAA_GAB_GBB,
  XC_N_S_GNN_GNS_GSS,
  XC_A_GAA_LAPA,
  XC_A_GAA_TAUA,
  XC_N_GNN_LAPN,
  XC_N_GNN_TAUN,
  XC_A_B_GAA_GAB_GBB_LAPA_LAPB,
  XC_A_B_GAA_GAB_GBB_TAUA_TAUB,
  XC_N_S_GNN_GNS_GSS_LAPN_LAPS,
  XC_N_S_GNN_GNS_GSS_TAUN_TAUS,
  XC_A_B_GAA_GAB_GBB_LAPA_LAPB_TAUA_TAUB,
  XC_A_B_GAA_GAB_GBB_LAPA_LAPB_TAUA_TAUB_JPAA_JPBB,
  XC_N_S_GNN_GNS_GSS_LAPN_LAPS_TAUN_TAUS,
  XC_A_AX_AY_AZ,
  XC_A_B_AX_AY_AZ_BX_BY_BZ,
  XC_N_NX_NY_NZ,
  XC_N_S_NX_NY_NZ_SX_SY_SZ,
  XC_A_AX_AY_AZ_TAUA,
  XC_A_B_AX_AY_AZ_BX_BY_BZ_TAUA_TAUB,
  XC_N_NX_NY_NZ_TAUN,
  XC_N_S_NX_NY_NZ_SX_SY_SZ_TAUN_TAUS,
  XC_A_2ND_TAYLOR,
  XC_A_B_2ND_TAYLOR,
  XC_N_2ND_TAYLOR,
  XC_N_S_2ND_TAYLOR,
  XC_NR_VARS
} xcfun_vars;

struct xcfun_s;
typedef struct xcfun_s xcfun_t;
"""

[fn]
prefix = "XCFun_API"

[parse]
parse_deps = false

# Plan 05-04 Task 4.2 fix: cbindgen emits Rust type names verbatim in
# function signatures (`xcfun_s *fun`). The cbindgen-generated header
# forward-declares `struct xcfun_s` (no typedef-without-struct), so a C
# function signature using bare `xcfun_s` is invalid. Rewrite the
# pointed-to type to `xcfun_t` (matching the prelude's `typedef struct
# xcfun_s xcfun_t;`) so signatures emit `xcfun_t *fun` — drop-in
# compatible with upstream `xcfun-master/api/xcfun.h` and valid C.
[export.rename]
"xcfun_s" = "xcfun_t"
